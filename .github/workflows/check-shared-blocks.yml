name: Shared blocks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Check cast/paint shared blocks are in sync
        run: ./scripts/check-shared-blocks.sh
